<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taya Navi</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root{
  --bg:#0b1e2d;      
  --card:#112b3c;      
  --text:#f1f5f9;      
  --border:#1f3a4d;    

  --green:#1bb76e;
  --blue:#3b82f6;
  --red:#e53935;
}
.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111;
  --border:#d0d6e2;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:30px;
}
.container{max-width:1000px;margin:auto}
.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
textarea,select{
  width:100%;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-top:6px;
}
textarea::placeholder{
  opacity:0.4;
}
button{
  padding:6px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  cursor:pointer;
  margin-right:8px;
}
.btn-generate{background:var(--green);color:white;border:none;}
.btn-open{background:var(--blue);color:white;border:none;}
.btn-copy{background:transparent;color:var(--text);}
.btn-clear{background:var(--red);color:white;border:none;}
.group{
  margin-bottom:15px;
  position:relative;
}
.remove-btn{
  position:absolute;
  right:0;
  top:0;
  font-size:12px;
  cursor:pointer;
  opacity:.65;
}
.footer{
  margin-top:30px;
  font-size:11px;
  opacity:.35;
  word-break:break-all;
}
.history-item{
  font-size:12px;
  border:1px solid var(--border);
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.controls{
  display:flex;
  gap:10px;
  align-items:center;
}
.toggle{cursor:pointer;opacity:.7;}
hr{margin:18px 0;opacity:.2}
</style>
</head>

<body class="light">
<div class="container">

<div class="topbar">
  <h2 id="ui_title">Taya Navi v1.1</h2>
  <div class="controls">
    <select id="lang" onchange="applyLanguage()">
      <option value="en" selected>English</option>
      <option value="ja">日本語</option>
      <option value="zh_cn">中文 (简体)</option>
      <option value="zh_tw">中文 (繁體)</option>
      <option value="mn">Монгол</option>
    </select>
    <div class="toggle" onclick="toggleTheme()">🌙 / ☀</div>
  </div>
</div>

<div class="card">
  <label><b id="ui_company_label">Company Names</b></label>
  <textarea id="companies" placeholder=""></textarea>

  <label><b id="ui_mode_label">Mode</b></label>
  <select id="mode">
    <option value="PAST" id="ui_mode_past">Former only (exclude current)</option>
    <option value="CURRENT" id="ui_mode_current">Current only</option>
    <option value="BOTH" id="ui_mode_both">Both (Current + Past)</option>
  </select>

  <hr>

  <div id="keywordContainer"></div>
  <button id="ui_add_group" onclick="addKeywordGroup()">+ Add Keyword Group (AND)</button>

  <br><br>

  <button class="btn-generate" onclick="generate()" id="ui_btn_generate">Generate</button>
  <button class="btn-open" onclick="openURL()" id="ui_btn_open">Open</button>
  <button class="btn-copy" onclick="copyURL()" id="ui_btn_copy">Copy</button>
  <button class="btn-clear" onclick="clearAllInputs()" id="ui_btn_clear">Clear All</button>
</div>

<div class="card">
  <h3 id="ui_exp_companies">Expanded Companies</h3>
  <textarea id="expandedCompanies" readonly></textarea>

  <h3 id="ui_exp_keywords">Expanded Keywords</h3>
  <textarea id="expandedKeywords" readonly></textarea>
</div>

<div class="card">
  <h3 id="ui_history_title">Recent Searches</h3>
  <div id="historyList"></div>
  <button class="btn-clear" onclick="clearHistory()" id="ui_clear_history">Clear History</button>
</div>

<div class="footer" id="urlFooter"></div>

</div>

<script>

const SPLIT_REGEX=/[\r\n,，、。:：・\/\\;；]+/g;
const MAX_GROUPS=4;
const MAX_HISTORY=10;
const LS_KEY="tayaHistory_v34";

let keywordGroups=[];
let generatedURL="";

const LANG = {
  en:{
    company:"Company Names",
    mode:"Mode",
    past:"Former only (exclude current)",
    current:"Current only",
    both:"Both (Current + Past)",
    add:"+ Add Keyword Group (AND)",
    generate:"Generate",
    open:"Open",
    copy:"Copy",
    clear:"Clear All",
    history:"Recent Searches",
    clearHistory:"Clear History",
    confirmClear:"Are you sure you want to clear all inputs?",
    confirmHistory:"Clear all history?",
    hint:"You can separate by line break or symbols like , ， 、 。 / ："
  },
  ja:{
    company:"会社名",
    mode:"モード",
    past:"過去のみ（現在を除外）",
    current:"現在のみ",
    both:"現在＋過去",
    add:"+ キーワードグループ追加 (AND)",
    generate:"生成",
    open:"開く",
    copy:"コピー",
    clear:"すべてクリア",
    history:"最近の検索",
    clearHistory:"履歴を削除",
    confirmClear:"入力内容をすべてクリアしますか？",
    confirmHistory:"履歴をすべて削除しますか？",
    hint:"改行または , ， 、 。 / ： などで区切れます"
  },
  zh_cn:{
    company:"公司名称",
    mode:"模式",
    past:"仅过去（排除当前）",
    current:"仅当前",
    both:"当前 + 过去",
    add:"+ 添加关键词组 (AND)",
    generate:"生成",
    open:"打开",
    copy:"复制",
    clear:"清空全部",
    history:"最近搜索",
    clearHistory:"清空历史",
    confirmClear:"确定要清空所有输入内容吗？",
    confirmHistory:"确定要清空历史记录吗？",
    hint:"可使用换行或 , ， 、 。 / ： 等符号分隔"
  },
  zh_tw:{
    company:"公司名稱",
    mode:"模式",
    past:"僅過去（排除當前）",
    current:"僅當前",
    both:"當前 + 過去",
    add:"+ 新增關鍵字群組 (AND)",
    generate:"產生",
    open:"開啟",
    copy:"複製",
    clear:"全部清除",
    history:"最近搜尋",
    clearHistory:"清除歷史",
    confirmClear:"確定要清空所有輸入內容嗎？",
    confirmHistory:"確定要清空歷史紀錄嗎？",
    hint:"可使用換行或 , ， 、 。 / ： 等符號分隔"
  },
  mn:{
    company:"Компанийн нэр",
    mode:"Горим",
    past:"Зөвхөн өмнөх",
    current:"Зөвхөн одоогийн",
    both:"Одоогийн + Өмнөх",
    add:"+ Түлхүүр үг нэмэх",
    generate:"Үүсгэх",
    open:"Нээх",
    copy:"Хуулах",
    clear:"Бүгдийг цэвэрлэх",
    history:"Сүүлийн хайлтууд",
    clearHistory:"Түүх устгах",
    confirmClear:"Бүх оруулсан мэдээллийг устгах уу?",
    confirmHistory:"Бүх түүхийг устгах уу?",
    hint:"Мөр сольж эсвэл , ， 、 。 / ： тэмдэгтээр салгаж болно"
  }
};

function applyLanguage(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;

  document.getElementById("ui_company_label").innerText=t.company;
  document.getElementById("ui_mode_label").innerText=t.mode;
  document.getElementById("ui_mode_past").innerText=t.past;
  document.getElementById("ui_mode_current").innerText=t.current;
  document.getElementById("ui_mode_both").innerText=t.both;
  document.getElementById("ui_add_group").innerText=t.add;
  document.getElementById("ui_btn_generate").innerText=t.generate;
  document.getElementById("ui_btn_open").innerText=t.open;
  document.getElementById("ui_btn_copy").innerText=t.copy;
  document.getElementById("ui_btn_clear").innerText=t.clear;
  document.getElementById("ui_history_title").innerText=t.history;
  document.getElementById("ui_clear_history").innerText=t.clearHistory;

  document.getElementById("companies").placeholder=t.hint;
  keywordGroups.forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.placeholder=t.hint;
  });
}

addKeywordGroup("");
renderHistory();
applyLanguage();

</script>
</body>
</html>
