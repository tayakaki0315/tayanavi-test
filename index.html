<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beta Taya Navi</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root{
  --bg:#0b1e2d;
  --card:#112b3c;
  --text:#f1f5f9;
  --border:#1f3a4d;
  --green:#1bb76e;
  --blue:#3b82f6;
  --red:#e53935;
}
.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111;
  --border:#d0d6e2;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:30px;
}
.container{max-width:1000px;margin:auto}
.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
textarea,select{
  width:100%;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}
button{
  padding:6px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  cursor:pointer;
  margin-right:8px;
}
.btn-generate{background:var(--green);color:white;border:none;}
.btn-open{background:var(--blue);color:white;border:none;}
.btn-copy{background:transparent;color:var(--text);}
.btn-clear{background:var(--red);color:white;border:none;}
.group{margin-bottom:15px;position:relative;}
.remove-btn{position:absolute;right:0;top:0;font-size:12px;cursor:pointer;opacity:.65;}
.footer{margin-top:30px;font-size:11px;opacity:.35;word-break:break-all;}
.history-item{font-size:12px;border:1px solid var(--border);padding:8px;border-radius:8px;margin-bottom:8px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.controls{display:flex;gap:10px;align-items:center;}
.toggle{cursor:pointer;opacity:.7;}
hr{margin:18px 0;opacity:.2}

.geo-panel{
  max-height:360px;
  overflow:auto;
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-top:8px;
  background:var(--bg);
}
.geo-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}
.geo-actions button{
  background:transparent;
  color:var(--text);
}
.geo-node{margin:4px 0;}
.geo-row{
  display:flex;
  align-items:center;
  gap:8px;
  line-height:1.4;
}
.geo-row input[type="checkbox"]{
  width:auto;
  margin:0;
}
.geo-children{
  margin-left:22px;
  padding-left:8px;
  border-left:1px dashed var(--border);
}
.geo-toggle{
  cursor:pointer;
  width:14px;
  display:inline-block;
  text-align:center;
  opacity:.75;
  user-select:none;
}
.geo-toggle.empty{visibility:hidden;}
.summary-box{margin-top:10px;font-size:12px;opacity:.85;white-space:pre-wrap;}
.geo-search-wrap{position:relative;margin-top:8px;}
.geo-search-input{
  width:100%;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  box-sizing:border-box;
}
.geo-suggestions{
  position:absolute;
  left:0;
  right:0;
  top:100%;
  margin-top:4px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  max-height:220px;
  overflow:auto;
  z-index:20;
  display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}
.geo-suggestion-item{
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  border-bottom:1px solid var(--border);
}
.geo-suggestion-item:last-child{border-bottom:none;}
.geo-suggestion-item:hover{background:rgba(59,130,246,.08);}
.geo-muted{opacity:.65;font-size:12px;}
.geo-highlight{
  background:rgba(255,230,120,.45);
  color:inherit;
  padding:0 2px;
  border-radius:4px;
}
</style>
</head>
<body class="light">
<div class="container">

<div class="topbar">
  <h2 id="ui_title">Taya Navi v1.2</h2>
  <div class="controls">
    <select id="lang" onchange="applyLanguage()">
      <option value="en" selected>English</option>

      <option value="zh_tw">中文 (繁體)</option>

  </div>
</div>

<div class="card">

  <textarea id="companies"></textarea>

  <label><b id="ui_mode_label">Mode</b></label>

    <option value="PAST" id="ui_mode_past">Former only (exclude current)</option>

    <input id="geoSearch" class="geo-search-input" type="text" placeholder="Search geography..." oninput="handleGeoSearch()" autocomplete="off">
    <div id="geoSuggestions" class="geo-suggestions"></div>
  </div>
  <div class="geo-panel" id="geoTree"></div>
  <div class="geo-actions">
    <button type="button" onclick="expandAllGeo()" id="ui_geo_expand">Expand All</button>

    <button type="button" onclick="clearGeo()" id="ui_geo_clear">Clear Geography</button>
  </div>
  <div class="summary-box" id="geoSummary"></div>

  <div id="keywordContainer"></div>

  <br><br>

  <button class="btn-generate" onclick="generate()" id="ui_btn_generate">Generate</button>
  <button class="btn-open" onclick="openURL()" id="ui_btn_open">Open</button>
  <button class="btn-copy" onclick="copyURL()" id="ui_btn_copy">Copy</button>
  <button class="btn-clear" onclick="clearAllInputs()" id="ui_btn_clear">Clear All</button>
</div>

<div class="card">
  <h3 id="ui_exp_companies">Expanded Companies</h3>
  <textarea id="expandedCompanies" readonly></textarea>

  <h3 id="ui_exp_keywords">Expanded Keywords</h3>
  <textarea id="expandedKeywords" readonly></textarea>

  <h3 id="ui_exp_geography">Expanded Geography</h3>
  <textarea id="expandedGeography" readonly></textarea>
</div>

<div class="card">
  <h3 id="ui_history_title">Recent Searches</h3>
  <div id="historyList"></div>
  <button class="btn-clear" onclick="clearHistory()" id="ui_clear_history">Clear History</button>
</div>

<div class="footer" id="urlFooter"></div>

</div>

function uniq(arr){return [...new Set(arr.map(x=>x.trim()).filter(Boolean))];}

function encForKeywords(raw){
  const once = encodeURIComponent(raw).replace(/\(/g,"%28").replace(/\)/g,"%29");
  return once.replace(/%/g,"%25");
}

function encForCompany(raw){
  const once = encodeURIComponent(raw);
  return once.replace(/%/g,"%25");
}

function formatGroup(raw){
  const list=uniq((raw||"").split(SPLIT_REGEX));
  if(!list.length) return "";
  return list.map(k=>/[\u4e00-\u9fff]/.test(k) ? `“${k}”` : `"${k}"`).join(" OR ");
}

function buildFilters(names,mode){
  const filterParts=[];

  function values(list,type){
    return list.map(n=>`(text%3A${encForCompany(n)}%2CselectionType%3A${type})`).join("%2C");
  }

  if(names.length){
    if(mode==="PAST"){
      filterParts.push(`(type%3APAST_COMPANY%2Cvalues%3AList(${values(names,"INCLUDED")}))`);
      filterParts.push(`(type%3ACURRENT_COMPANY%2Cvalues%3AList(${values(names,"EXCLUDED")}))`);
    }else if(mode==="CURRENT"){
      filterParts.push(`(type%3ACURRENT_COMPANY%2Cvalues%3AList(${values(names,"INCLUDED")}))`);
    }else{
      filterParts.push(`(type%3APAST_COMPANY%2Cvalues%3AList(${values(names,"INCLUDED")}))`);
      filterParts.push(`(type%3ACURRENT_COMPANY%2Cvalues%3AList(${values(names,"INCLUDED")}))`);
    }
  }

  const geoSelections=getSelectedLeafGeographies();
  if(geoSelections.length){
    const regionValues=geoSelections
      .map(name => GEO_ID_MAP[name])
      .filter(Boolean)
      .map(region => `(id%3A${region.id}%2Ctext%3A${encForCompany(region.text)}%2CselectionType%3AINCLUDED)`)
      .join("%2C");

    if(regionValues){
      filterParts.push(`(type%3AREGION%2Cvalues%3AList(${regionValues}))`);
    }
  }

  return filterParts.join("%2C");
}

function generate(){
  const companies=document.getElementById("companies").value;
  const mode=document.getElementById("mode").value;
  const names=uniq((companies||"").split(SPLIT_REGEX));
  document.getElementById("expandedCompanies").value=names.join("\n");

  const groupsFormatted=keywordGroups.map(id=>formatGroup(document.getElementById(id).value)).filter(Boolean);
  const keywordString=groupsFormatted.map(g=>`(${g})`).join(" AND ");
  document.getElementById("expandedKeywords").value=keywordString;

  const selectedGeo=getSelectedLeafGeographies();
  document.getElementById("expandedGeography").value=selectedGeo.join("\n");

  const filters=buildFilters(names,mode);
  const keywordBlock=keywordString?`%2Ckeywords%3A${encForKeywords(keywordString)}`:"";
  const query=`(spellCorrectionEnabled%3Atrue%2CrecentSearchParam%3A(doLogHistory%3Atrue)%2Cfilters%3AList(${filters})${keywordBlock})`;
  generatedURL=`https://www.linkedin.com/sales/search/people?query=${query}&viewAllFilters=true`;
  document.getElementById("urlFooter").innerText=generatedURL;
  saveHistory();
}

function copyURL(){if(generatedURL)navigator.clipboard.writeText(generatedURL);}
function openURL(){if(generatedURL)window.open(generatedURL,"_blank");}

function addKeywordGroup(value=""){
  if(keywordGroups.length>=MAX_GROUPS)return;
  const id="kw"+Date.now()+Math.floor(Math.random()*1000);
  keywordGroups.push(id);
  const div=document.createElement("div");
  div.className="group";
  div.innerHTML=`<label><b>Keyword Group (${keywordGroups.length})</b></label>
  <span class="remove-btn" onclick="removeGroup('${id}')">Remove</span>
  <textarea id="${id}">${value}</textarea>`;
  document.getElementById("keywordContainer").appendChild(div);
}

function removeGroup(id){
  keywordGroups=keywordGroups.filter(x=>x!==id);
  document.getElementById(id).parentElement.remove();
}

function clearAllInputs(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;
  if(!confirm(t.confirmClear))return;

  document.getElementById("companies").value="";
  document.getElementById("mode").value="PAST";
  document.getElementById("keywordContainer").innerHTML="";
  keywordGroups=[];
  addKeywordGroup("");
  document.getElementById("expandedCompanies").value="";
  document.getElementById("expandedKeywords").value="";
  document.getElementById("expandedGeography").value="";
  document.getElementById("urlFooter").innerText="";
  generatedURL="";
  clearGeo(false);
}

function saveHistory(){
  if(!generatedURL)return;
  const history=JSON.parse(localStorage.getItem(LS_KEY)||"[]");
  history.unshift({
    companies:document.getElementById("companies").value,
    mode:document.getElementById("mode").value,
    keywords:keywordGroups.map(id=>document.getElementById(id).value),
    geo:getSelectedLeafGeographies(),
    url:generatedURL,
    time:new Date().toLocaleString()
  });
  localStorage.setItem(LS_KEY,JSON.stringify(history.slice(0,MAX_HISTORY)));
  renderHistory();
}

function renderHistory(){
  const history=JSON.parse(localStorage.getItem(LS_KEY)||"[]");
  const container=document.getElementById("historyList");
  container.innerHTML="";
  history.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="history-item";
    const geoText=(item.geo||[]).join(", ");
    div.innerHTML=`<b>${item.time}</b><br>${item.companies||"(no companies)"}<br>${geoText || "(no geography)"}<br>
    <button onclick="loadHistory(${index})">Load</button>
    <button onclick="deleteHistory(${index})">Delete</button>`;
    container.appendChild(div);
  });
}

function loadHistory(index){
  const history=JSON.parse(localStorage.getItem(LS_KEY)||"[]");
  const item=history[index];
  if(!item)return;
  document.getElementById("companies").value=item.companies;
  document.getElementById("mode").value=item.mode;
  document.getElementById("keywordContainer").innerHTML="";
  keywordGroups=[];
  (item.keywords||[]).forEach(k=>addKeywordGroup(k));
  setSelectedGeographies(item.geo||[]);
  generatedURL=item.url;
  document.getElementById("urlFooter").innerText=generatedURL;
  document.getElementById("expandedGeography").value=(item.geo||[]).join("\n");
}

function deleteHistory(index){
  const history=JSON.parse(localStorage.getItem(LS_KEY)||"[]");
  history.splice(index,1);
  localStorage.setItem(LS_KEY,JSON.stringify(history));
  renderHistory();
}

function clearHistory(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;
  if(!confirm(t.confirmHistory))return;
  localStorage.removeItem(LS_KEY);
  renderHistory();
}

function toggleTheme(){document.body.classList.toggle("light");}

function createGeoNode(node, path=[]){
  const currentPath=[...path, node.label];
  const hasChildren=Array.isArray(node.children) && node.children.length>0;

  const wrapper=document.createElement("div");
  wrapper.className="geo-node";

  const row=document.createElement("div");
  row.className="geo-row";

  const toggle=document.createElement("span");
  toggle.className=`geo-toggle${hasChildren ? "" : " empty"}`;
  toggle.textContent=hasChildren ? "▾" : "•";
  row.appendChild(toggle);

  const checkbox=document.createElement("input");
  checkbox.type="checkbox";
  checkbox.dataset.label=node.label;
  checkbox.dataset.path=currentPath.join(" > ");
  checkbox.dataset.hasChildren=hasChildren ? "1" : "0";
  row.appendChild(checkbox);

  const label=document.createElement("span");
  label.className = "geo-label";
  label.dataset.label = node.label;
  label.textContent=node.label;
  row.appendChild(label);
  wrapper.appendChild(row);

  let childContainer=null;
  if(hasChildren){
    childContainer=document.createElement("div");
    childContainer.className="geo-children";
    node.children.forEach(child=>childContainer.appendChild(createGeoNode(child, currentPath)));
    wrapper.appendChild(childContainer);

    toggle.onclick=()=>{
      const collapsed=childContainer.style.display==="none";
      childContainer.style.display=collapsed ? "block" : "none";
      toggle.textContent=collapsed ? "▾" : "▸";
    };

    checkbox.addEventListener("change",()=>{
      childContainer.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
        cb.checked=checkbox.checked;
        cb.indeterminate=false;
      });
      updateGeoParents();
      updateGeoSummary();
    });
  }else{
    checkbox.addEventListener("change",()=>{
      updateGeoParents();
      updateGeoSummary();
    });
  }

  return wrapper;
}

function renderGeoTree(){
  const container=document.getElementById("geoTree");
  container.innerHTML="";
  GEO_SEARCH_INDEX.length = 0;
  GEO_TREE.forEach(node=>container.appendChild(createGeoNode(node)));

  document.querySelectorAll('#geoTree input[type="checkbox"][data-has-children="0"]').forEach(cb=>{
    GEO_SEARCH_INDEX.push({
      label: cb.dataset.label,
      path: cb.dataset.path,
      checkbox: cb
    });
  });

  updateGeoSummary();
}

function updateGeoParents(){
  const nodes=[...document.querySelectorAll('#geoTree .geo-node')].reverse();
  nodes.forEach(node=>{
    const parentCb=node.querySelector(':scope > .geo-row input[type="checkbox"]');
    const childCbs=[...node.querySelectorAll(':scope > .geo-children input[type="checkbox"]')];
    if(!childCbs.length) return;
    const allChecked=childCbs.every(cb=>cb.checked);
    const someChecked=childCbs.some(cb=>cb.checked || cb.indeterminate);
    parentCb.checked=allChecked;
    parentCb.indeterminate=!allChecked && someChecked;
  });
}

function getSelectedGeographies(){
  return [...document.querySelectorAll('#geoTree input[type="checkbox"]')]
    .filter(cb=>cb.checked)
    .map(cb=>cb.dataset.label);
}

function getSelectedLeafGeographies(){
  return [...document.querySelectorAll('#geoTree input[type="checkbox"][data-has-children="0"]')]
    .filter(cb=>cb.checked)
    .map(cb=>cb.dataset.label);
}

function setSelectedGeographies(labels){
  document.querySelectorAll('#geoTree input[type="checkbox"]').forEach(cb=>{
    cb.checked=labels.includes(cb.dataset.label);
    cb.indeterminate=false;
  });
  updateGeoParents();
  updateGeoSummary();
}

function clearGeo(update=true){
  document.querySelectorAll('#geoTree input[type="checkbox"]').forEach(cb=>{
    cb.checked=false;
    cb.indeterminate=false;
  });
  clearGeoSearch();
  if(update) updateGeoSummary();
}

function expandAllGeo(){
  document.querySelectorAll('#geoTree .geo-children').forEach(el=>el.style.display='block');
  document.querySelectorAll('#geoTree .geo-toggle').forEach(el=>{
    if(!el.classList.contains('empty')) el.textContent='▾';
  });
}

function collapseAllGeo(){
  document.querySelectorAll('#geoTree .geo-children').forEach(el=>el.style.display='none');
  document.querySelectorAll('#geoTree .geo-toggle').forEach(el=>{
    if(!el.classList.contains('empty')) el.textContent='▸';
  });
}

function updateGeoSummary(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;
  const selected=getSelectedLeafGeographies();
  document.getElementById("geoSummary").textContent=`${t.selectedGeo}: ${selected.length ? selected.join(', ') : t.none}`;
}

function expandGeoPath(checkbox){
  let node = checkbox.closest('.geo-node');
  while(node){
    const children = node.querySelector(':scope > .geo-children');
    const toggle = node.querySelector(':scope > .geo-row .geo-toggle');
    if(children){
      children.style.display = 'block';
      if(toggle && !toggle.classList.contains('empty')) toggle.textContent = '▾';
    }
    node = node.parentElement ? node.parentElement.closest('.geo-node') : null;
  }
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function highlightMatch(text, keyword){
  if(!keyword) return escapeHtml(text);
  const safeText = escapeHtml(text);
  const safeKeyword = escapeHtml(keyword.trim());
  if(!safeKeyword) return safeText;
  const escaped = safeKeyword.replace(/[.*+?^${}()|[\]\]/g, '\$&');
  return safeText.replace(new RegExp(`(${escaped})`, 'ig'), '<span class="geo-highlight">$1</span>');
}

function applyGeoHighlight(keyword){
  document.querySelectorAll('#geoTree .geo-label').forEach(labelEl=>{
    const raw = labelEl.dataset.label || labelEl.textContent || '';
    labelEl.innerHTML = highlightMatch(raw, keyword);
  });
}

function renderGeoSuggestions(keyword){
  const box=document.getElementById('geoSuggestions');
  if(!keyword){
    box.style.display='none';
    box.innerHTML='';
    return;
  }

  const q=keyword.trim().toLowerCase();
  const matched=GEO_SEARCH_INDEX.filter(item=>
    item.label.toLowerCase().includes(q) || item.path.toLowerCase().includes(q)
  ).slice(0,12);

  if(!matched.length){
    box.style.display='none';
    box.innerHTML='';
    return;
  }

  box.innerHTML = matched.map(item => `
    <div class="geo-suggestion-item" onclick="selectGeoByLabel('${item.label.replace(/'/g, "\'")}')">
      <div>${highlightMatch(item.label, keyword)}</div>
      <div class="geo-muted">${highlightMatch(item.path, keyword)}</div>
    </div>
  `).join('');
  box.style.display='block';
}

function handleGeoSearch(){
  const input=document.getElementById('geoSearch');
  const rawKeyword=input.value.trim();
  const keyword=rawKeyword.toLowerCase();
  const nodes=[...document.querySelectorAll('#geoTree .geo-node')];

  if(!keyword){
    nodes.forEach(node=>node.style.display='');
    document.getElementById('geoSuggestions').style.display='none';
    applyGeoHighlight('');
    collapseAllGeo();
    return;
  }

  nodes.forEach(node=>node.style.display='none');
  document.querySelectorAll('#geoTree input[type="checkbox"][data-has-children="0"]').forEach(cb=>{
    const label=cb.dataset.label.toLowerCase();
    const path=cb.dataset.path.toLowerCase();
    if(label.includes(keyword) || path.includes(keyword)){
      let node=cb.closest('.geo-node');
      while(node){
        node.style.display='';
        const children=node.querySelector(':scope > .geo-children');
        const toggle=node.querySelector(':scope > .geo-row .geo-toggle');
        if(children){
          children.style.display='block';
          if(toggle && !toggle.classList.contains('empty')) toggle.textContent='▾';
        }
        node=node.parentElement ? node.parentElement.closest('.geo-node') : null;
      }
    }
  });

  applyGeoHighlight(rawKeyword);
  renderGeoSuggestions(rawKeyword);
}

function clearGeoSearch(){
  const input=document.getElementById('geoSearch');
  const box=document.getElementById('geoSuggestions');
  input.value='';
  box.style.display='none';
  box.innerHTML='';
  document.querySelectorAll('#geoTree .geo-node').forEach(node=>node.style.display='');
  applyGeoHighlight('');
  collapseAllGeo();
}

function selectGeoByLabel(label){
  const entry=GEO_SEARCH_INDEX.find(item=>item.label===label);
  if(!entry) return;
  entry.checkbox.checked = true;
  expandGeoPath(entry.checkbox);
  updateGeoParents();
  updateGeoSummary();
  clearGeoSearch();
}

document.addEventListener('click', (e) => {
  const wrap=document.querySelector('.geo-search-wrap');
  if(!wrap) return;
  if(!wrap.contains(e.target)){
    const box=document.getElementById('geoSuggestions');
    if(box){
      box.style.display='none';
    }
  }
});

function applyLanguage(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;

  document.getElementById("ui_company_label").innerText=t.company;
  document.getElementById("ui_mode_label").innerText=t.mode;
  document.getElementById("ui_geo_label").innerText=t.geography;
  document.getElementById("ui_exp_geography").innerText=t.expandedGeography;
  document.getElementById("ui_mode_past").innerText=t.past;
  document.getElementById("ui_mode_current").innerText=t.current;
  document.getElementById("ui_mode_both").innerText=t.both;
  document.getElementById("ui_add_group").innerText=t.add;
  document.getElementById("ui_btn_generate").innerText=t.generate;
  document.getElementById("ui_btn_open").innerText=t.open;
  document.getElementById("ui_btn_copy").innerText=t.copy;
  document.getElementById("ui_btn_clear").innerText=t.clear;
  document.getElementById("ui_history_title").innerText=t.history;
  document.getElementById("ui_clear_history").innerText=t.clearHistory;
  document.getElementById("ui_geo_expand").innerText=t.expandAll;
  document.getElementById("ui_geo_collapse").innerText=t.collapseAll;
  document.getElementById("ui_geo_clear").innerText=t.clearGeography;
  const geoSearch=document.getElementById("geoSearch");
  if(geoSearch) geoSearch.placeholder=t.geoSearchPlaceholder || "Search geography...";
  updateGeoSummary();
}

addKeywordGroup("");
renderGeoTree();
collapseAllGeo();
renderHistory();
applyLanguage();
</script>
</body>
</html>
