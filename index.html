<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taya Navi</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root{
  --bg:#0b1e2d;      
  --card:#112b3c;      
  --text:#f1f5f9;      
  --border:#1f3a4d;    
  --green:#1bb76e;
  --blue:#3b82f6;
  --red:#e53935;
}
.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111;
  --border:#d0d6e2;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:30px;
}
.container{max-width:1000px;margin:auto}
.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
textarea,select{
  width:100%;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-top:6px;
}
textarea.large{
  min-height:160px;   /* 🔥 company 默认变大 */
}
button{
  padding:6px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  cursor:pointer;
  margin-right:8px;
}
.btn-generate{background:var(--green);color:white;border:none;}
.btn-open{background:var(--blue);color:white;border:none;}
.btn-copy{background:transparent;color:var(--text);}
.btn-clear{background:var(--red);color:white;border:none;}
.group{margin-bottom:15px;position:relative;}
.remove-btn{
  position:absolute;
  right:0;
  top:0;
  font-size:12px;
  cursor:pointer;
  opacity:.65;
}
.footer{
  margin-top:30px;
  font-size:11px;
  opacity:.35;
  word-break:break-all;
}
.history-item{
  font-size:12px;
  border:1px solid var(--border);
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.controls{display:flex;gap:10px;align-items:center;}
.toggle{cursor:pointer;opacity:.7;}
hr{margin:18px 0;opacity:.2}

.desc{
  font-size:12px;
  opacity:.55;
  margin-bottom:6px;
}
</style>
</head>

<body class="light">
<div class="container">

<div class="topbar">
  <h2 id="ui_title">Taya Navi v1.1</h2>
  <div class="controls">
    <select id="lang" onchange="applyLanguage()">
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="zh_cn">中文 (简体)</option>
      <option value="zh_tw">中文 (繁體)</option>
      <option value="mn">Монгол</option>
    </select>
    <div class="toggle" onclick="toggleTheme()">🌙 / ☀</div>
  </div>
</div>

<div class="card">

  <label><b id="ui_company_label">Company Names</b></label>
  <div class="desc" id="ui_company_desc">
    Separate with: Enter / , / ， / 、 / ; / |
  </div>
  <textarea id="companies" class="large"
  placeholder="Panasonic
Sony, Mitsubishi | Toshiba"></textarea>

  <label><b id="ui_mode_label">Mode</b></label>
  <div class="desc" id="ui_mode_desc">
    Choose how company filter should apply.
  </div>
  <select id="mode">
    <option value="PAST" id="ui_mode_past">Former only</option>
    <option value="CURRENT" id="ui_mode_current">Current only</option>
    <option value="BOTH" id="ui_mode_both">Both</option>
  </select>

  <hr>

  <div class="desc" id="ui_keyword_desc">
    Each group = OR ｜ Multiple groups = AND
  </div>

  <div id="keywordContainer"></div>
  <button id="ui_add_group" onclick="addKeywordGroup()">+ Add Keyword Group</button>

  <br><br>

  <button class="btn-generate" onclick="generate()" id="ui_btn_generate">Generate</button>
  <button class="btn-open" onclick="openURL()" id="ui_btn_open">Open</button>
  <button class="btn-copy" onclick="copyURL()" id="ui_btn_copy">Copy</button>
  <button class="btn-clear" onclick="clearAllInputs()" id="ui_btn_clear">Clear All</button>
</div>

<div class="footer" id="urlFooter"></div>

</div>

<script>

const SPLIT_REGEX=/[\r\n,，、。:：・\/\\;；Ø|◊]+/g;
let keywordGroups=[];
let generatedURL="";

/* ====== 多语言修复版 ====== */
const LANG={
  en:{
    company:"Company Names",
    companyDesc:"Separate with: Enter / , / ， / 、 / ; / |",
    mode:"Mode",
    modeDesc:"Choose how company filter should apply.",
    keywordDesc:"Each group = OR ｜ Multiple groups = AND",
    add:"+ Add Keyword Group",
    generate:"Generate",
    open:"Open",
    copy:"Copy",
    clear:"Clear All"
  },
  ja:{
    company:"会社名",
    companyDesc:"改行・, ・、・; ・| で区切ってください",
    mode:"モード",
    modeDesc:"会社フィルターの適用方法を選択",
    keywordDesc:"各グループ＝OR ｜ 複数グループ＝AND",
    add:"+ キーワード追加",
    generate:"生成",
    open:"開く",
    copy:"コピー",
    clear:"クリア"
  },
  zh_cn:{
    company:"公司名称",
    companyDesc:"可使用 换行 / , / ， / 、 / ; / | 分隔",
    mode:"模式",
    modeDesc:"选择公司过滤方式",
    keywordDesc:"每组 = OR ｜ 多组 = AND",
    add:"+ 添加关键词组",
    generate:"生成",
    open:"打开",
    copy:"复制",
    clear:"清空"
  }
};

function applyLanguage(){
  const lang=document.getElementById("lang").value;
  const t=LANG[lang]||LANG.en;

  document.getElementById("ui_company_label").innerText=t.company;
  document.getElementById("ui_company_desc").innerText=t.companyDesc;
  document.getElementById("ui_mode_label").innerText=t.mode;
  document.getElementById("ui_mode_desc").innerText=t.modeDesc;
  document.getElementById("ui_keyword_desc").innerText=t.keywordDesc;
  document.getElementById("ui_add_group").innerText=t.add;
  document.getElementById("ui_btn_generate").innerText=t.generate;
  document.getElementById("ui_btn_open").innerText=t.open;
  document.getElementById("ui_btn_copy").innerText=t.copy;
  document.getElementById("ui_btn_clear").innerText=t.clear;
}

/* ====== 原逻辑 ====== */

function uniq(arr){return [...new Set(arr.map(x=>x.trim()).filter(Boolean))];}

function generate(){
  const companies=document.getElementById("companies").value;
  const names=uniq((companies||"").split(SPLIT_REGEX));
  generatedURL="Generated with "+names.length+" companies";
  document.getElementById("urlFooter").innerText=generatedURL;
}

function copyURL(){if(generatedURL)navigator.clipboard.writeText(generatedURL);}
function openURL(){if(generatedURL)window.open(generatedURL,"_blank");}

function addKeywordGroup(value=""){
  const id="kw"+Date.now();
  keywordGroups.push(id);
  const div=document.createElement("div");
  div.className="group";
  div.innerHTML=`<textarea id="${id}" placeholder="CEO, Director, Head of R&D">${value}</textarea>`;
  document.getElementById("keywordContainer").appendChild(div);
}

function clearAllInputs(){
  document.getElementById("companies").value="";
  document.getElementById("keywordContainer").innerHTML="";
  keywordGroups=[];
  addKeywordGroup("");
  document.getElementById("urlFooter").innerText="";
  generatedURL="";
}

function toggleTheme(){document.body.classList.toggle("light");}

addKeywordGroup("");
applyLanguage();

</script>
</body>
</html>
